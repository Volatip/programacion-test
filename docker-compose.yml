services:
  postgres:
    image: postgres:15-alpine
    container_name: programacion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: programacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.local or pass --env-file}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
